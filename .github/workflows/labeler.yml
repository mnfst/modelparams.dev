name: Labeler

# Labels PRs by the paths they touch, using .github/labeler.yml.
# Runs as pull_request_target so it works on fork PRs too. It only reads the
# list of changed files and applies labels; it never checks out or runs the
# PR's code, so the elevated token stays safe.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: false
