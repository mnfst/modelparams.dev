# yaml-language-server: $schema=https://modelparams.dev/api/v1/schema.json
provider: minimax
authType: subscription
model: minimax-m2.7-highspeed
params:
  - path: max_tokens
    type: integer
    label: Max tokens
    description: Maximum number of tokens to generate in the response.
    range:
      min: 1
    group: generation_length
  - path: temperature
    type: number
    label: Temperature
    description: >-
      Controls randomness. Lower values make outputs more focused; higher values make them more
      varied. Values must be greater than 0 and at most 1.
    default: 1
    range:
      min: 0.01
      max: 1
      step: 0.01
    group: sampling
  - path: top_p
    type: number
    label: Top P
    description: Controls nucleus sampling by limiting generation to tokens within the selected cumulative probability.
    default: 0.95
    range:
      min: 0.01
      max: 1
      step: 0.01
    group: sampling
  - path: thinking
    type: boolean
    label: Thinking
    description: Enables the model's reasoning process to be returned in the response.
    default: false
    group: reasoning
