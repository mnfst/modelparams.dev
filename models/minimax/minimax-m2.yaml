# yaml-language-server: $schema=https://modelparams.dev/api/v1/schema.json
provider: minimax
authType: api_key
model: minimax-m2
params:
  - path: max_completion_tokens
    type: integer
    label: Max completion tokens
    description: Maximum number of tokens to generate in the completion.
    range:
      min: 1
    group: generation_length
  - path: temperature
    type: number
    label: Temperature
    description: >-
      Controls randomness. Lower values make outputs more focused; higher values make them more
      varied. Values must be greater than 0 and at most 1.
    default: 1
    range:
      min: 0
      max: 1
      step: 0.1
    group: sampling
  - path: top_p
    type: number
    label: Top P
    description: Controls nucleus sampling by limiting generation to tokens within the selected cumulative probability.
    default: 0.95
    range:
      min: 0
      max: 1
      step: 0.01
    group: sampling
  - path: reasoning_split
    type: boolean
    label: Split reasoning
    description: Returns the model's reasoning in a separate reasoning_details field instead of inline with the response.
    default: false
    group: reasoning
