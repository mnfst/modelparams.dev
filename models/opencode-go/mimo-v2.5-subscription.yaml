# yaml-language-server: $schema=https://modelparams.dev/api/v1/schema.json
provider: opencode-go
authType: subscription
model: mimo-v2.5
params:
  - path: max_completion_tokens
    type: integer
    label: Max completion tokens
    description: Upper bound for visible output tokens generated in the chat completion.
    range:
      min: 1
    group: generation_length
  - path: stop
    type: string
    label: Stop sequence
    description: Stops generation when this string is produced. MiMo also accepts multiple stop sequences.
    group: generation_length
  - path: temperature
    type: number
    label: Temperature
    description: Controls randomness. Lower values make outputs more focused; higher values make them more varied.
    default: 1
    range:
      min: 0
      max: 2
      step: 0.1
    group: sampling
  - path: top_p
    type: number
    label: Top P
    description: Controls nucleus sampling by limiting generation to tokens within the selected cumulative probability.
    default: 0.95
    range:
      min: 0
      max: 1
      step: 0.01
    group: sampling
  - path: frequency_penalty
    type: number
    label: Frequency penalty
    description: Penalizes tokens that have already appeared, reducing repeated text.
    default: 0
    range:
      min: -2
      max: 2
      step: 0.1
    group: sampling
  - path: presence_penalty
    type: number
    label: Presence penalty
    description: Penalizes tokens that have appeared at least once, encouraging new topics.
    default: 0
    range:
      min: -2
      max: 2
      step: 0.1
    group: sampling
