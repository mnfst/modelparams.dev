# yaml-language-server: $schema=https://modelparams.dev/api/v1/schema.json
provider: deepseek
authType: api_key
model: deepseek-reasoner
params:
  - path: max_tokens
    type: integer
    label: Max tokens
    description: Maximum number of output tokens the model may generate.
    default: 4096
    range:
      min: 1
    group: generation_length
  - path: temperature
    type: number
    label: Temperature
    description: >-
      Controls randomness. In DeepSeek thinking mode this parameter is accepted for compatibility
      but has no effect.
    default: 1
    range:
      min: 0
      max: 2
      step: 0.1
    group: sampling
    applicability:
      except:
        thinking.type:
          - enabled
  - path: top_p
    type: number
    label: Top P
    description: >-
      Controls nucleus sampling. In DeepSeek thinking mode this parameter is accepted for
      compatibility but has no effect.
    default: 1
    range:
      min: 0
      max: 1
      step: 0.01
    group: sampling
    applicability:
      except:
        thinking.type:
          - enabled
  - path: thinking.type
    type: enum
    label: Thinking mode
    description: Controls whether DeepSeek uses thinking mode before producing the final answer.
    default: enabled
    values:
      - enabled
      - disabled
    group: reasoning
  - path: reasoning_effort
    type: enum
    label: Reasoning effort
    description: Controls DeepSeek thinking effort when thinking mode is enabled.
    default: high
    values:
      - high
      - max
    group: reasoning
    applicability:
      only:
        thinking.type: enabled
