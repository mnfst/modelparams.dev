# yaml-language-server: $schema=https://modelparameters.dev/api/v1/schema.json
provider: deepseek
authType: api_key
model: deepseek-reasoner
params:
  - path: reasoning_effort
    type: enum
    label: Reasoning effort
    description: Controls DeepSeek thinking effort for the legacy thinking-mode model alias.
    default: high
    values:
      - high
      - max
    group: reasoning
