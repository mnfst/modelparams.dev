# yaml-language-server: $schema=https://modelparams.dev/api/v1/schema.json
provider: z-ai
authType: api_key
model: glm-5.2
params:
  - path: max_tokens
    type: integer
    label: Max tokens
    description: Maximum number of tokens to generate in the response.
    default: 65536
    range:
      min: 1
      max: 131072
    group: generation_length
  - path: temperature
    type: number
    label: Temperature
    description: Controls randomness. Lower values make outputs more focused; higher values make them more varied.
    default: 1
    range:
      min: 0
      max: 1
      step: 0.1
    group: sampling
    applicability:
      except:
        do_sample: false
  - path: top_p
    type: number
    label: Top P
    description: Controls nucleus sampling by limiting generation to tokens within the selected cumulative probability.
    default: 0.95
    range:
      min: 0.01
      max: 1
      step: 0.01
    group: sampling
    applicability:
      except:
        do_sample: false
  - path: do_sample
    type: boolean
    label: Do sample
    description: When false, the model uses greedy decoding and ignores temperature and top_p.
    default: true
    group: sampling
  - path: thinking.type
    type: enum
    label: Thinking mode
    description: Toggles the model's extended reasoning before it produces the final answer.
    default: enabled
    values:
      - enabled
      - disabled
    group: reasoning
  - path: reasoning_effort
    type: enum
    label: Reasoning effort
    description: Controls how much reasoning effort GLM-5.2 spends when thinking is enabled.
    default: max
    values:
      - none
      - minimal
      - low
      - medium
      - high
      - xhigh
      - max
    group: reasoning
    applicability:
      only:
        thinking.type: enabled
  - path: response_format.type
    type: enum
    label: Response format
    description: Forces the response into plain text or a JSON object.
    default: text
    values:
      - text
      - json_object
    group: output_format
