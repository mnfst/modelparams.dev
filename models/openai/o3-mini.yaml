# yaml-language-server: $schema=https://modelparameters.dev/api/v1/schema.json
provider: openai
authType: api_key
model: o3-mini
params:
  - path: max_completion_tokens
    type: integer
    label: Max completion tokens
    description: Upper bound on combined reasoning + response tokens.
    range:
      min: 1
    group: generation_length
  - path: reasoning_effort
    type: enum
    label: Reasoning effort
    description: How much the model should think before answering.
    default: medium
    values: [low, medium, high]
    group: reasoning
  - path: response_format
    type: enum
    label: Response format
    description: Output format constraint.
    default: text
    values: [text, json_schema]
    group: output_format
  - path: stream
    type: boolean
    label: Stream
    description: Stream the visible response (not reasoning tokens).
    default: false
    group: output_format
  - path: service_tier
    type: enum
    label: Service tier
    description: Latency/cost tier.
    default: auto
    values: [auto, default, flex]
    group: provider_metadata
