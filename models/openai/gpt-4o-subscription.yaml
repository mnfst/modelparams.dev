# yaml-language-server: $schema=https://modelparameters.dev/api/v1/schema.json
provider: openai
authType: subscription
model: gpt-4o
params:
  - path: custom_instructions
    type: string
    label: Custom instructions
    description: Free-form context applied to every conversation (set in profile).
    group: provider_metadata
  - path: memory
    type: boolean
    label: Memory
    description: Whether ChatGPT can remember details across conversations.
    default: true
    group: tooling
  - path: web_browsing
    type: boolean
    label: Web browsing
    description: Allow ChatGPT to browse the live web.
    default: true
    group: tooling
  - path: canvas
    type: boolean
    label: Canvas
    description: Open long-form writing or code in the Canvas side panel.
    default: false
    group: tooling
  - path: image_generation
    type: boolean
    label: Image generation
    description: Generate images inline (subject to plan rate limits).
    default: true
    group: tooling
  - path: voice_mode
    type: boolean
    label: Voice mode
    description: Speak to and listen to ChatGPT via voice mode.
    default: true
    group: tooling
  - path: custom_gpts
    type: boolean
    label: Custom GPTs
    description: Use Custom GPTs in addition to the default assistant.
    default: true
    group: tooling
