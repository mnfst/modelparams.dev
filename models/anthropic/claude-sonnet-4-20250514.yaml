# yaml-language-server: $schema=https://modelparameters.dev/api/v1/schema.json
provider: anthropic
authType: api_key
model: claude-sonnet-4-20250514
params:
  - path: max_tokens
    type: integer
    label: Max tokens
    description: Maximum number of output tokens the model may generate.
    default: 4096
    range:
      min: 1
    group: generation_length
  - path: temperature
    type: number
    label: Temperature
    description: >-
      Controls randomness. Lower values make outputs more focused; higher values make them more
      varied.
    default: 1
    range:
      min: 0
      max: 1
      step: 0.1
    group: sampling
    applicability:
      except:
        - thinking.type:
            - enabled
  - path: top_p
    type: number
    label: Top P
    description: >-
      Controls nucleus sampling by limiting generation to tokens whose cumulative probability
      reaches this value.
    default: 1
    range:
      min: 0
      max: 1
      step: 0.01
    group: sampling
    applicability:
      except:
        - thinking.type:
            - enabled
  - path: top_k
    type: integer
    label: Top K
    description: Limits token sampling to the top K most likely next tokens.
    default: 0
    range:
      min: 0
    group: sampling
    applicability:
      except:
        thinking.type:
          - enabled
  - path: thinking.type
    type: enum
    label: Thinking mode
    description: Controls the Anthropic thinking mode values supported by this model.
    default: disabled
    values:
      - disabled
      - enabled
    group: reasoning
  - path: thinking.budget_tokens
    type: integer
    label: Budget tokens
    description: >-
      Maximum token budget Anthropic may use for extended thinking before producing the final
      answer.
    default: 4096
    range:
      min: 1024
    group: reasoning
    applicability:
      only:
        thinking.type: enabled
  - path: thinking.display
    type: enum
    label: Thinking display
    description: Controls whether Anthropic returns summarized or omitted thinking content.
    default: summarized
    values:
      - summarized
      - omitted
    group: reasoning
    applicability:
      only:
        thinking.type:
          - enabled
