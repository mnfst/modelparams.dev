# yaml-language-server: $schema=https://modelparameters.dev/api/v1/schema.json
provider: anthropic
authType: subscription
model: claude-opus-4-7
params:
  - path: response_style
    type: enum
    label: Response style
    description: Preset that nudges Claude's tone and verbosity. Selected from the conversation menu.
    default: normal
    values: [normal, concise, explanatory, formal]
    group: output_format
  - path: extended_thinking
    type: boolean
    label: Extended thinking
    description: Toggle visible extended-thinking output in the conversation UI.
    default: false
    group: reasoning
  - path: artifacts
    type: boolean
    label: Artifacts
    description: Render code, documents, and other long-form output in the side panel.
    default: true
    group: tooling
  - path: web_search
    type: boolean
    label: Web search
    description: Allow Claude to search the live web during the conversation.
    default: false
    group: tooling
  - path: projects
    type: boolean
    label: Projects
    description: Attach the conversation to a project with persistent context and uploaded files.
    default: false
    group: tooling
  - path: personal_preferences
    type: string
    label: Personal preferences
    description: Free-form preferences applied to every conversation (set in profile).
    group: provider_metadata
