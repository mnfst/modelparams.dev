# yaml-language-server: $schema=https://modelparameters.dev/api/v1/schema.json
provider: anthropic
authType: subscription
model: claude-sonnet-4-6
params:
  - path: response_style
    type: enum
    label: Response style
    description: Conversation tone preset.
    default: normal
    values: [normal, concise, explanatory, formal]
    group: output_format
  - path: extended_thinking
    type: boolean
    label: Extended thinking
    description: Show extended thinking in the response panel.
    default: false
    group: reasoning
  - path: artifacts
    type: boolean
    label: Artifacts
    description: Open long outputs in the side panel.
    default: true
    group: tooling
  - path: web_search
    type: boolean
    label: Web search
    description: Allow live web search during the conversation.
    default: false
    group: tooling
